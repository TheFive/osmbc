<!doctype html>
<html lang="en">
<head>

  <style>
    .option-wrapper {
      margin-bottom: 30px;
    }

    /* Farbvarianten für osmbc-automated-translation in jeder Option */
    .option-1 .osmbc-automated-translation {
      color: #000 !important;
      background-color: #ffc107 !important;
    }

    .option-1 .osmbc-not-formulated {
      background-color: #FFF8C6;  /* Salmon Chiffon */
    }



    .option-2 .osmbc-automated-translation {
      color: #000 !important;
      background-color: #deaa87 !important;
    }

    .option-2 .osmbc-not-formulated {
      background-color: #FFF8C6;  /* Salmon Chiffon */
    }

    .option-3 .osmbc-automated-translation {
      color: #000 !important;
      background-color: #e4dbd6 !important;
    }

    .option-3 .osmbc-not-formulated {
      background-color: #FFF8C6;  /* Salmon Chiffon */
    }

    .option-4 .osmbc-automated-translation {
      color: #000 !important;
      background-color: #FFF8C6 !important;
    }
    .option-4 .osmbc-not-formulated {
      background-color: #ffc107;  /* Salmon Chiffon */
    }

    .option-5 .osmbc-automated-translation {
      color: #000 !important;
      background-color: #FFF8C6 !important;
    }
    .option-5 .osmbc-automated-translation a{
      color: #000 !important;
      background-color: #FFF8C6 !important;
    }
    .option-5 .osmbc-not-formulated {
      background-color: #ffc107;  /* Salmon Chiffon */
    }



    .option-title {
      margin: 0 0 10px 0;
      font-size: 1.5rem;
      font-weight: 700;
    }

    .preview-shell {
      border: 1px solid #e7e7e7;
      padding: 8px 8px 14px 8px;
      background: #fff;
    }
  </style>
</head>

        <div class="col-md-1">
        </div>

          <div class="row">
            <div class="col-md-6">

            </div>
            <div class="d-none d-md-block col-md-6">
              <h2 id="wn290_mapping">Mapping</h2>

      </div>

      <div class="row">
        <div class="col-md-1 d-flex flex-nowrap"><span><div class="d-flex flex-nowrap"><a href="/article/12"><i class="fa fa-edit small-margin"></i></a></div></span><span></span><span></span><span id="voteLabels12"><div class="d-flex flex-nowrap"></div></span></div>
        <div class="col-md-11">

            <div class="col-md-6">

                <ul>

        <div class="col-md-11">

        <div class="col-md-11">

            <div class="col-md-6">

                  <div class="preview" id="lpreview55">

            </div>
            <div class="d-none d-md-block col-md-6">

      </div>

  </template>

  <script>
    var openEditor = null;

    (function renderOptions() {
      var root = document.getElementById('options-root');
      var template = document.getElementById('content-block-template');
      var headings = ['Current Version', 'Option 1', 'Option 2', 'Option 3',"Option 4"];
      var optionClasses = ['option-1', 'option-2', 'option-3', 'option-4','option-5'];

      headings.forEach(function (title, index) {
        var wrapper = document.createElement('section');
        wrapper.className = 'option-wrapper ' + optionClasses[index];

        var heading = document.createElement('h1');
        heading.className = 'option-title';
        heading.textContent = title;
        wrapper.appendChild(heading);

        wrapper.appendChild(template.content.cloneNode(true));
        root.appendChild(wrapper);
      });
    })();
  </script>
</body>
</html>
